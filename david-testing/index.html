<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperentrepreneur.com</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
        }

        a {
            color: #fff;
            text-decoration: none;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.7; }

        #countdown-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        #timer-display {
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 24px rgba(255,255,255,0.15));
            transition: filter 0.1s;
        }

        #timer-display .ms {
            font-size: 2.5rem;
            opacity: 0.5;
        }

        #redirect-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #555;
        }

        #progress-bar {
            width: 220px;
            height: 2px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #fff 0%, #666 100%);
            border-radius: 2px;
            transform-origin: left;
            transition: transform 0.05s linear;
        }
    </style>
</head>
<body>
    <a href="https://hyperentrepreneur.com">Hello David, Klemen was here</a>

    <div id="countdown-wrap">
        <div id="timer-display">
            <span id="sec">10</span><span class="ms">.<span id="ms">000</span></span>
        </div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="redirect-label">Redirecting&hellip;</div>
    </div>

    <script>
        const DURATION = 10000;
        const start = performance.now();
        const secEl = document.getElementById('sec');
        const msEl = document.getElementById('ms');
        const fill = document.getElementById('progress-fill');
        const display = document.getElementById('timer-display');

        function tick(now) {
            const elapsed = now - start;
            const remaining = Math.max(0, DURATION - elapsed);
            const secs = Math.floor(remaining / 1000);
            const ms = Math.floor(remaining % 1000);

            secEl.textContent = secs;
            msEl.textContent = String(ms).padStart(3, '0');
            fill.style.transform = `scaleX(${remaining / DURATION})`;

            if (remaining <= 2000) {
                display.style.filter = `drop-shadow(0 0 ${Math.round((1 - remaining / 2000) * 40)}px rgba(255,255,255,0.4))`;
            }

            if (remaining <= 0) {
                window.location.href = 'https://hyperentrepreneur.com';
                return;
            }
            requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
    </script>
</body>
</html>
